name: Daily GitHub Agent
permissions:
  contents: write
on:
  schedule:
    # 每天北京时间早上 9:00 运行 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许你手动点击按钮触发测试

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Agent
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          NOTIFIER_WEBHOOK: ${{ secrets.NOTIFIER_WEBHOOK }}
          GITHUB_TOKEN: ${{ github.token }}
          SEND_MESSAGE: 'false'
          TRENDING_LANGUAGE: python
          TRENDING_SINCE: daily
          ANALYSIS_NUM: '1'
          README_MAX_LENGTH: '20000'
          SAVE_README: 'false'
          PROMPT_TEMPLATE_PATH: Prompt.txt
          LOG_DIR: logs
          DATABASE_URL: sqlite:///backend/database/agent.db
          FINAL_REPORT_PATH: final_report.txt
        run: python main.py

      - name: Commit database changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/database/agent.db final_report.txt
          if git diff --cached --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "chore: update daily agent database"
            git push
          fi
